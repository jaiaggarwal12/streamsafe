services:
  - type: web
    name: streamsafe-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: streamsafe-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: streamsafe-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"

  - type: redis
    name: streamsafe-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: streamsafe-db
    plan: free
    databaseName: streamsafe
