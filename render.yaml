services:
  - type: web
    name: streamsafe-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: streamsafe-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: streamsafe-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"

  - type: redis
    name: streamsafe-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: streamsafe-db
    plan: free
    databaseName: streamsafe
